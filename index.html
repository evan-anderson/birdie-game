// ---------- responsive scaling ----------
function fit() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  cv.style.width = Math.floor(W * s) + 'px';
  cv.style.height = Math.floor(H * s) + 'px';
}
window.addEventListener('resize', fit);
fit();

// ---------- pixel sprite builder ----------
function makeSprite(rows, palette, scale) {
  const c = document.createElement('canvas');
  c.width = rows[0].length * scale;
  c.height = rows.length * scale;
  const g = c.getContext('2d');
  rows.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      const col = palette[row[x]];
      if (col) { g.fillStyle = col; g.fillRect(x * scale, y * scale, scale, scale); }
    }
  });
  return c;
}

// ---------- audio (tiny WebAudio synth, no assets) ----------
let audioCtx = null, muted = false;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function blip(freq, dur = 0.09, type = 'square', vol = 0.12, delay = 0, slideTo = null) {
  if (muted) return;
  try {
    const a = ac(), o = a.createOscillator(), gn = a.createGain();
    const t = a.currentTime + delay;
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    gn.gain.setValueAtTime(vol, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(gn).connect(a.destination);

// iOS mutes WebAudio while the ringer switch is on silent, unless the page

  const wr = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };
  wr(0, 'RIFF'); v.setUint32(4, 36 + dataSize, true); wr(8, 'WAVE');
  wr(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, 44100, true); v.setUint32(28, 88200, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  wr(36, 'data'); v.setUint32(40, dataSize, true);

  unlockAudio();
  keys[e.key.toLowerCase()] = true;

  if (state === 'entername') { nameKey(e); return; }

function nameKey(e) {
  if (/^[a-z]$/i.test(e.key)) {
    entryName[entrySlot] = e.key.toUpperCase();
    entrySlot = Math.min(entrySlot + 1, 2);
  } else if (e.key === 'Backspace' || e.key === 'ArrowLeft') {
    entrySlot = Math.max(entrySlot - 1, 0);
  } else if (e.key === 'ArrowRight') {
    entrySlot = Math.min(entrySlot + 1, 2);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    const d = e.key === 'ArrowUp' ? -1 : 1;
    const i = LETTERS.indexOf(entryName[entrySlot]);
    entryName[entrySlot] = LETTERS[(i + d + 26) % 26];

function canvasPt(e) {
  const r = cv.getBoundingClientRect();

}

cv.addEventListener('pointerdown', e => {

function tryStart() {

  combo = 0; meter = 0; zoomies = 0; lastTickSec = 99;
  items = []; popups = []; particles = []; pigeons = []; eatFx = [];
  pigeonTimer = 5 + Math.random() * 4;
  goldTimes = [16 + Math.random() * 8, 36 + Math.random() * 10];
  goldIdx = 0;
  announceMsg = ''; announceT = 0;

// ---------- spawning ----------
function spawnItem(type, x, vy) {

    grounded: false, groundT: 0,
  });
}
function spawnRandomItem() {
  const t = Math.min(elapsed / DURATION, 1);
  const roll = Math.random();
  const chocP = elapsed < 5 ? 0 : 0.06 + 0.08 * t;
  let type;
  if (roll < chocP) type = 'choc';
  else if (roll < chocP + 0.10) type = 'melon';
  else if (roll < chocP + 0.10 + 0.24) type = 'treat';
  else type = 'kibble';
  const spread = type === 'melon' ? 620 : 420; // melons tempt you to run
  const x = Math.max(28, Math.min(WORLD_W - 28, dog.x + (Math.random() * 2 - 1) * spread));
  spawnItem(type, x, (140 + 190 * t) * (0.85 + Math.random() * 0.3));
}
function spawnGold() {
  const side = Math.random() < 0.5 ? -1 : 1;
  const x = Math.max(60, Math.min(WORLD_W - 60, dog.x + side * (500 + Math.random() * 400)));
  spawnItem('gold', x, 55);
  announceMsg = '✨ GOLDEN WATERMELON! ✨'; announceT = 2.5;

function addPopup(x, y, text, color, size) { popups.push({ x, y, text, color, t: 1, size: size || 20 }); }
function addBurst(x, y, color, n, floaty) {

      x, y,

// ---------- eating ----------
function eatItem(it, ix) {
  const def = ITEM_TYPES[it.type];
  const mult = multiplier();
  const pts = def.pts * mult;
  score += pts;
  combo++;
  if (combo % 5 === 0 && multiplier() > 1) {
    addPopup(dog.x, GROUND_Y - 120, 'COMBO x' + multiplier() + '!', '#ffe066', 24);
    sfx.combo(multiplier());
  }
  if (!zoomies) {
    meter = Math.min(1, meter + def.meter);
    if (meter >= 1) {
      zoomies = 5; meter = 1;
      announceMsg = '💨 ZOOMIES!!! 💨'; announceT = 1.6;
      sfx.zoom();
    }
  }
  dog.eatT = 0.42;
  dog.eatColor = def.color;
  eatFx.push({ spr: def.spr, x: ix, y: it.y, t: 0.13, dur: 0.13 });
  addPopup(ix, GROUND_Y - 80, '+' + pts, def.color);
  if (it.type === 'melon' || it.type === 'gold') {
    dog.hopV = -180; // happy hop
    addBurst(ix, GROUND_Y - 60, it.type === 'gold' ? '#ffd43b' : '#ff8fa3', 10, true);

// ---------- update ----------
function update(dt) {
  ambientT += dt;
  // ambient life keeps moving on every screen
  punts.forEach(p => {
    p.x += p.dir * 18 * dt;
    if (p.x > p.max) { p.x = p.max; p.dir = -1; }
    if (p.x < p.min) { p.x = p.min; p.dir = 1; }
  });
  ducks.forEach(d => {
    d.x += d.dir * d.sp * dt;
    if (d.x > 1420) d.x = 0;
    if (d.x < 0) d.x = 1420;
  });
  clouds.forEach(c => { c.x += 4 * c.s * dt; if (c.x > WORLD_W + 40) c.x = -80; });
  if (overCooldown > 0) overCooldown -= dt;
  if (announceT > 0) announceT -= dt;

  // camera
  if (state === 'title') {
    const span = WORLD_W - W;
    const ph = (ambientT * 26) % (span * 2);
    camX = ph < span ? ph : span * 2 - ph;
  } else {
    const target = Math.max(0, Math.min(WORLD_W - W, dog.x - W / 2 + dog.facing * 40));
    camX += (target - camX) * Math.min(1, dt * 6);
  }

  // popups + particles + eat fx always tick
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.y -= 45 * dt; p.t -= dt * 1.1;
    if (p.t <= 0) popups.splice(i, 1);
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.grav * dt; p.t -= dt;
    if (p.t <= 0) particles.splice(i, 1);
  }
  for (let i = eatFx.length - 1; i >= 0; i--) {
    const f = eatFx[i];
    f.t -= dt;
    if (f.t <= 0) eatFx.splice(i, 1);
  }

  if (state === 'dying') {
    dyingT -= dt;
    if (dyingT <= 0) finishGame('choc');
    return;
  }
  if (state !== 'playing') return;

  elapsed += dt;
  if (elapsed >= DURATION) { finishGame('time'); return; }
  const remaining = Math.ceil(DURATION - elapsed);
  if (remaining <= 3 && remaining < lastTickSec) { sfx.tick(); lastTickSec = remaining; }

  // golden watermelon events
  if (goldIdx < goldTimes.length && elapsed >= goldTimes[goldIdx]) { spawnGold(); goldIdx++; }

  // zoomies
  if (zoomies > 0) {
    zoomies -= dt;
    meter = Math.max(0, zoomies / 5);
    if (zoomies <= 0) { zoomies = 0; meter = 0; }
    // rainbow trail
    particles.push({
      x: dog.x - dog.facing * 30 + (Math.random() - 0.5) * 20,
      y: GROUND_Y - 20 - Math.random() * 35 + dog.hopY,
      vx: -dog.facing * 40, vy: -20, grav: 0, t: 0.35,
      color: 'hsl(' + Math.floor(ambientT * 400 % 360) + ',90%,65%)',
    });
  }

  // movement
  const maxSp = zoomies ? 660 : 420;
  const accel = zoomies ? 3800 : 2400;
  const left = keys['arrowleft'] || keys['a'], right = keys['arrowright'] || keys['d'];
  if (dragScreenX !== null) {
    // finger position is screen-space; re-derive the world target every
    // frame so holding at the edge keeps running as the camera scrolls
    const dx = dragScreenX + camX - dog.x;
    dog.vx = Math.abs(dx) < 8 ? 0 : Math.max(-maxSp - 40, Math.min(maxSp + 40, dx * 10));
  } else {
    const dir = (right ? 1 : 0) - (left ? 1 : 0);
    if (dir !== 0) dog.vx += dir * accel * dt;
    else dog.vx *= Math.pow(0.0001, dt);
    dog.vx = Math.max(-maxSp, Math.min(maxSp, dog.vx));
  }
  dog.x += dog.vx * dt;
  dog.x = Math.max(40, Math.min(WORLD_W - 40, dog.x));
  if (Math.abs(dog.vx) > 20) dog.facing = dog.vx > 0 ? 1 : -1;
  dog.animT += dt * Math.min(Math.abs(dog.vx) / 120, 3);
  // eat animation + chew crumbs
  if (dog.eatT > 0) {
    const before = dog.eatT;
    dog.eatT -= dt;
    for (const th of [0.28, 0.14]) {
      if (before > th && dog.eatT <= th) {
        addBurst(dog.x + dog.facing * 38, GROUND_Y - 38 + dog.hopY, dog.eatColor, 4);
        sfx.chew();
      }
    }
  }
  // jump / happy-hop physics
  if (dog.hopV !== 0 || dog.hopY < 0) {
    const wasHigh = dog.hopY < -30;
    dog.hopY += dog.hopV * dt;
    dog.hopV += 1150 * dt;
    if (dog.hopY >= 0) {
      dog.hopY = 0; dog.hopV = 0;
      if (wasHigh) { addBurst(dog.x, GROUND_Y - 4, '#9aa0ab', 6); sfx.land(); }
    }
  }

  // spawning ramps up over the minute
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnRandomItem();
    const t = Math.min(elapsed / DURATION, 1);
    spawnTimer = (0.9 - 0.52 * t) * (0.8 + Math.random() * 0.4);
  }

  // pigeons: airborne food thieves
  pigeonTimer -= dt;
  if (pigeonTimer <= 0 && pigeons.length < 2) {
    const dir = Math.random() < 0.5 ? 1 : -1;
    pigeons.push({
      x: dir > 0 ? camX - 40 : camX + W + 40,
      y: 130 + Math.random() * 240,
      dir, sp: 130 + Math.random() * 70,
      carrying: null, flapT: 0,
    });
    pigeonTimer = 6 + Math.random() * 5;
  }
  for (let i = pigeons.length - 1; i >= 0; i--) {
    const pg = pigeons[i];
    pg.x += pg.dir * pg.sp * dt;
    pg.flapT += dt;
    pg.y += Math.sin(pg.flapT * 6) * 12 * dt;
    if (!pg.carrying) {
      for (let j = items.length - 1; j >= 0; j--) {
        const it = items[j];
        if (it.grounded || (it.type !== 'kibble' && it.type !== 'treat')) continue;
        const ix = it.x + Math.sin(it.sway) * 6;
        if (Math.abs(ix - pg.x) < 22 && Math.abs(it.y - pg.y) < 22) {
          pg.carrying = it.type;
          items.splice(j, 1);
          addPopup(ix, it.y, 'STOLEN!', '#c8d4cd', 16);
          sfx.steal();
          break;
        }
      }
    }
    if (pg.x < camX - 220 || pg.x > camX + W + 220) pigeons.splice(i, 1);
  }

  // items fall + collisions
  const hb = { left: dog.x - 34, right: dog.x + 34, top: GROUND_Y - 58 + dog.hopY, bottom: GROUND_Y + 4 + dog.hopY };
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    const def = ITEM_TYPES[it.type];
    const spr = def.spr;
    if (!it.grounded) {
      it.y += it.vy * dt;
      it.sway += dt * 2.2;
      // zoomies magnet pulls edibles in
      if (zoomies > 0 && it.type !== 'choc' && it.y > 250) {
        const dx = dog.x - it.x;
        if (Math.abs(dx) < 170) it.x += Math.sign(dx) * Math.min(Math.abs(dx), 300 * dt);
      }
      // golden sparkle
      if (it.type === 'gold' && Math.random() < 0.35) {
        particles.push({ x: it.x + (Math.random() - 0.5) * 40, y: it.y + Math.random() * 30, vx: 0, vy: -25, grav: 0, t: 0.4, color: '#ffe066' });
      }
      if (it.y + spr.height >= 606) { // lands on the towpath
        it.grounded = true;
        it.y = 606 - spr.height;
        it.groundT = 2.2;
        addBurst(it.x, 600, '#9aa0ab', 4);
      }
    } else {
      it.groundT -= dt;
      if (it.groundT <= 0) {
        if (it.type !== 'choc' && combo >= 5) {
          addPopup(it.x, 560, 'COMBO LOST', '#8a94a0', 15);
          sfx.lost();
        }
        if (it.type !== 'choc') combo = 0;
        items.splice(i, 1);
        continue;
      }
    }
    const ix = it.grounded ? it.x : it.x + Math.sin(it.sway) * 6;
    const hw = spr.width / 2;
    if (it.y + spr.height > hb.top && it.y < hb.bottom && ix + hw > hb.left && ix - hw < hb.right) {
      items.splice(i, 1);
      if (it.type === 'choc') {
        state = 'dying'; dyingT = 1.2;
        sfx.choc();
        addBurst(ix, GROUND_Y - 40, '#7048e8', 14);
      } else {
        eatItem(it, ix);
      }
    }
  }
}

const RANKS = [
  [400, 'GOOD GIRL'],
  [1000, 'VERY GOOD GIRL'],
  [2000, 'CHAMPION CHOMPER'],
  [3500, 'QUEEN OF THE CAM'],
  [Infinity, 'ABSOLUTE LEGEND'],
];
function rankFor(s) { for (const [max, name] of RANKS) if (s < max) return name; return RANKS[RANKS.length - 1][1]; }

function finishGame(reason) {
  gameOverReason = reason;
  overCooldown = 0.8;
  highScore = Math.max(highScore, score);
  const qualifies = score > 0 && (board.length < 5 || score > board[board.length - 1].score);
  if (qualifies) {
    state = 'entername';
    entrySlot = 0;
  } else {
    state = 'gameover';
    newEntryIdx = -1;
    saveBoard();
  }
  sfx.over();
}
function confirmName() {
  const entry = { name: entryName.join(''), score };
  board.push(entry);
  board.sort((a, b) => b.score - a.score);
  board = board.slice(0, 5);
  newEntryIdx = board.indexOf(entry);
  saveBoard();
  overCooldown = 0.8;
  state = 'gameover';
  sfx.combo(3);
}

// ---------- render helpers ----------
function drawPunt(g, p) {
  const x = p.x, y = 432 + Math.sin(ambientT * 1.8 + p.x) * 2;
  g.fillStyle = '#6e4a28'; g.fillRect(x, y, 64, 8);
  g.fillStyle = '#8a6136'; g.fillRect(x, y, 64, 3);
  g.fillStyle = '#31456e'; g.fillRect(x + 50, y - 16, 7, 16);
  g.fillStyle = '#e8c49c'; g.fillRect(x + 51, y - 22, 6, 6);
  g.fillStyle = '#e9d47f'; g.fillRect(x + 48, y - 23, 12, 2); g.fillRect(x + 51, y - 27, 6, 4);
  g.strokeStyle = '#8a6136'; g.lineWidth = 2;
  g.beginPath(); g.moveTo(x + 58, y - 24); g.lineTo(x + 66, y + 14); g.stroke();
  g.fillStyle = '#7c3f52'; g.fillRect(x + 14, y - 8, 8, 8);
  g.fillStyle = '#e8c49c'; g.fillRect(x + 15, y - 13, 6, 5);
}
function drawDuck(g, d) {
  g.save(); g.translate(d.x, d.y + Math.sin(ambientT * 2 + d.x) * 1.5);
  if (d.dir < 0) g.scale(-1, 1);
  g.fillStyle = '#f4f1e6'; g.fillRect(-5, -3, 10, 5); g.fillRect(1, -8, 5, 6);
  g.fillStyle = '#e8a33d'; g.fillRect(6, -6, 3, 2);
  g.restore();
}
function drawCloud(g, c) {
  g.fillStyle = 'rgba(238,242,245,0.92)';
  g.fillRect(c.x, c.y + 8, 64 * c.s, 12);
  g.fillRect(c.x + 10 * c.s, c.y, 30 * c.s, 10);
  g.fillRect(c.x + 34 * c.s, c.y + 3, 22 * c.s, 8);
}
function drawPigeon(g, pg) {
  const spr = (pg.flapT * 8 % 2 < 1) ? sprPigeonA : sprPigeonB;
  g.save(); g.translate(pg.x, pg.y);
  if (pg.dir < 0) g.scale(-1, 1);
  g.drawImage(spr, -18, -12);
  g.restore();
  if (pg.carrying) {
    const cs = ITEM_TYPES[pg.carrying].spr;
    g.drawImage(cs, pg.x - cs.width / 2, pg.y + 12);
  }
}
function drawDog(g) {
  let spr = sprDogA;
  if (state === 'dying') spr = sprDogChomp;
  else if (dog.eatT > 0) {
    const phase = 0.42 - dog.eatT;
    spr = phase < 0.1 ? sprDogChomp : ((phase * 14 % 2 < 1) ? sprDogChew : sprDogA);
  } else if (dog.hopY < -10) spr = sprDogB; // legs splayed mid-air
  else if (Math.abs(dog.vx) > 20) spr = (dog.animT * 6 % 2 < 1) ? sprDogA : sprDogB;
  g.save();
  g.translate(dog.x, GROUND_Y + dog.hopY);
  if (dog.facing < 0) g.scale(-1, 1);
  g.drawImage(spr, -48, -64);
  g.restore();
  if (state === 'dying') {
    g.fillStyle = '#e03131';
    g.font = 'bold 30px "Courier New", monospace';
    g.textAlign = 'center';
    g.fillText('!', dog.x, GROUND_Y - 74);
  }
}

function drawHUD(g) {
  g.fillStyle = 'rgba(15,23,32,0.78)'; g.fillRect(0, 0, W, 66);
  g.fillStyle = '#85b09a'; g.fillRect(0, 66, W, 3);
  g.textBaseline = 'middle';
  g.font = 'bold 17px "Courier New", monospace';
  g.fillStyle = '#ffffff'; g.textAlign = 'left';
  g.fillText('SCORE ' + score, 14, 20);
  g.fillStyle = '#c8d4cd'; g.textAlign = 'right';
  g.fillText('BEST ' + highScore, W - 14, 20);
  const remaining = Math.max(0, Math.ceil(DURATION - elapsed));
  g.textAlign = 'center';
  g.font = 'bold 26px "Courier New", monospace';
  g.fillStyle = remaining <= 10 ? (remaining % 2 === 0 ? '#ff6b6b' : '#ffd8d8') : '#ffe066';
  g.fillText(String(remaining), W / 2, 22);
  // row 2: combo + zoomies meter
  g.font = 'bold 14px "Courier New", monospace';
  g.textAlign = 'left';
  const m = multiplier();
  g.fillStyle = m > 1 ? '#ffe066' : '#8a94a0';
  g.fillText('COMBO ' + combo + '  x' + m, 14, 50);
  g.fillStyle = '#8a94a0';
  g.fillText('ZOOMIES', 210, 50);
  g.strokeStyle = '#8a94a0'; g.lineWidth = 2;
  g.strokeRect(292, 42, 172, 16);
  if (meter > 0) {
    g.fillStyle = zoomies > 0
      ? 'hsl(' + Math.floor(ambientT * 400 % 360) + ',90%,60%)'
      : '#ff8fa3';
    g.fillRect(294, 44, Math.round(168 * meter), 12);
  }
  g.textBaseline = 'alphabetic';
}

// edge arrows for off-screen watermelons
function drawArrows(g) {
  items.forEach(it => {
    if (it.type !== 'melon' && it.type !== 'gold') return;
    const color = it.type === 'gold' ? '#ffd43b' : '#ff5f6d';
    const y = Math.max(90, Math.min(590, it.y + 20));
    let ax = null, dir = 0;
    if (it.x < camX - 10) { ax = 16; dir = -1; }
    else if (it.x > camX + W + 10) { ax = W - 16; dir = 1; }
    if (ax === null) return;
    const pulse = 0.7 + 0.3 * Math.sin(ambientT * 8);
    g.globalAlpha = pulse;
    g.fillStyle = color;
    g.beginPath();
    g.moveTo(ax + dir * 12, y);
    g.lineTo(ax - dir * 6, y - 11);
    g.lineTo(ax - dir * 6, y + 11);
    g.closePath(); g.fill();
    g.globalAlpha = 1;
  });
}

function drawTitle(g) {
  g.fillStyle = 'rgba(10,16,24,0.82)'; g.fillRect(0, 0, W, H);
  g.textAlign = 'center';
  g.fillStyle = '#85b09a';
  g.font = 'bold 28px "Courier New", monospace';
  g.fillText("BIRDIE'S", W / 2, 70);
  g.fillStyle = '#ff5f6d';
  g.font = 'bold 32px "Courier New", monospace';
  g.fillText('WATERMELON FEAST', W / 2, 106);
  g.fillStyle = '#9fb2c8';
  g.font = '14px "Courier New", monospace';
  g.fillText('60 seconds. All of Cambridge. One hungry dog.', W / 2, 132);

  const s = 6;
  g.save();
  g.translate(W / 2 - (24 * s) / 2, 148);
  g.scale(s / 4, s / 4);
  g.drawImage(sprDogTitle, 0, 0);
  g.restore();

  g.fillStyle = '#e8ecef';
  drawLegendRow(g, sprKibble, 'Kibble ......  +10', 290);
  drawLegendRow(g, sprBone, 'Treat .......  +25', 322);
  drawLegendRow(g, sprMelon, 'Watermelon .. +100', 358);
  g.fillStyle = '#ffd43b';
  drawLegendRow(g, sprGold, 'Golden ...... +250', 398);
  g.fillStyle = '#ff8787';
  drawLegendRow(g, sprChoc, 'Chocolate ... NO!!', 440);

  g.textAlign = 'center';
  g.fillStyle = '#9fb2c8';
  g.font = '13px "Courier New", monospace';
  g.fillText('Chain catches to build your combo multiplier.', W / 2, 478);
  g.fillText('Fill the bar for ZOOMIES. Beware thieving pigeons!', W / 2, 496);
  g.fillText('← → run  •  SPACE/W jump chocolate  •  touch: drag + JUMP', W / 2, 522);
  g.globalAlpha = 0.6 + 0.4 * Math.sin(ambientT * 4);
  g.fillStyle = '#ffe066';
  g.font = 'bold 20px "Courier New", monospace';
  g.fillText('PRESS SPACE OR TAP TO START', W / 2, 560);
  g.globalAlpha = 1;

  // little leaderboard teaser
  if (board.length) {
    g.fillStyle = '#8a94a0';
    g.font = '13px "Courier New", monospace';
    g.fillText('TOP DOG: ' + board[0].name + ' ' + board[0].score, W / 2, 592);
  }
}
function drawLegendRow(g, spr, label, y) {
  g.drawImage(spr, W / 2 - 92 - spr.width / 2, y - spr.height / 2);
  g.textAlign = 'left';
  g.font = 'bold 16px "Courier New", monospace';
  g.fillText(label, W / 2 - 58, y + 5);
}

function drawEnterName(g) {
  g.fillStyle = 'rgba(10,16,24,0.88)'; g.fillRect(0, 0, W, H);
  g.textAlign = 'center';
  g.globalAlpha = 0.7 + 0.3 * Math.sin(ambientT * 6);
  g.fillStyle = '#ffe066';
  g.font = 'bold 26px "Courier New", monospace';
  g.fillText('★ TOP 5 SCORE! ★', W / 2, 100);
  g.globalAlpha = 1;
  g.fillStyle = '#ffffff';
  g.font = 'bold 30px "Courier New", monospace';
  g.fillText(String(score), W / 2, 145);
  g.fillStyle = '#9fb2c8';
  g.font = '14px "Courier New", monospace';
  g.fillText('ENTER YOUR INITIALS', W / 2, 180);

  for (let i = 0; i < 3; i++) {
    const sx = nameSlotX(i);
    const active = i === entrySlot;
    // arrows
    g.fillStyle = active ? '#ffe066' : '#5a6470';
    g.beginPath(); g.moveTo(sx, 224); g.lineTo(sx - 16, 250); g.lineTo(sx + 16, 250); g.closePath(); g.fill();
    g.beginPath(); g.moveTo(sx, 374); g.lineTo(sx - 16, 348); g.lineTo(sx + 16, 348); g.closePath(); g.fill();
    // letter box
    g.strokeStyle = active ? '#ffe066' : '#5a6470'; g.lineWidth = 3;
    g.strokeRect(sx - 28, 264, 56, 72);
    g.fillStyle = active ? '#ffffff' : '#c8d4cd';
    g.font = 'bold 48px "Courier New", monospace';
    g.fillText(entryName[i], sx, 318);
  }
  // OK button
  g.strokeStyle = '#85b09a'; g.lineWidth = 3;
  g.strokeRect(W / 2 - 80, 424, 160, 46);
  g.fillStyle = '#85b09a';
  g.font = 'bold 24px "Courier New", monospace';
  g.fillText('OK', W / 2, 456);
  g.fillStyle = '#8a94a0';
  g.font = '13px "Courier New", monospace';
  g.fillText('type letters, or tap the arrows', W / 2, 510);
}

function drawGameOver(g) {
  g.fillStyle = 'rgba(10,16,24,0.87)'; g.fillRect(0, 0, W, H);
  g.textAlign = 'center';
  if (gameOverReason === 'choc') {
    g.drawImage(sprChoc, W / 2 - sprChoc.width / 2, 72);
    g.fillStyle = '#ff6b6b';
    g.font = 'bold 26px "Courier New", monospace';
    g.fillText('NO CHOCOLATE FOR DOGS!', W / 2, 140);
    g.fillStyle = '#9fb2c8';
    g.font = '13px "Courier New", monospace';
    g.fillText('Chocolate is toxic to dogs. Birdie is fine —', W / 2, 164);
    g.fillText('but the game is over!', W / 2, 180);
  } else {
    g.fillStyle = '#85b09a';
    g.font = 'bold 32px "Courier New", monospace';
    g.fillText("TIME'S UP!", W / 2, 120);
    g.fillStyle = '#9fb2c8';
    g.font = '14px "Courier New", monospace';
    g.fillText('Birdie is stuffed and very happy.', W / 2, 150);
  }
  g.fillStyle = '#ffffff';
  g.font = 'bold 28px "Courier New", monospace';
  g.fillText('SCORE  ' + score, W / 2, 230);
  g.fillStyle = '#ffd43b';
  g.font = 'bold 18px "Courier New", monospace';
  g.fillText('RANK: ' + rankFor(score), W / 2, 262);

  // leaderboard
  g.fillStyle = '#85b09a';
  g.font = 'bold 16px "Courier New", monospace';
  g.fillText('— TOP DOGS —', W / 2, 320);
  g.font = 'bold 18px "Courier New", monospace';
  for (let i = 0; i < 5; i++) {
    const y = 352 + i * 28;
    if (i < board.length) {
      const hl = i === newEntryIdx;
      if (hl) {
        g.globalAlpha = 0.75 + 0.25 * Math.sin(ambientT * 6);
        g.fillStyle = '#ffe066';
      } else g.fillStyle = '#c8d4cd';
      g.textAlign = 'left';
      g.fillText((i + 1) + '. ' + board[i].name, W / 2 - 100, y);
      g.textAlign = 'right';
      g.fillText(String(board[i].score), W / 2 + 100, y);
      g.globalAlpha = 1;
    } else {
      g.fillStyle = '#4a5560';
      g.textAlign = 'left'; g.fillText((i + 1) + '. ---', W / 2 - 100, y);
      g.textAlign = 'right'; g.fillText('-', W / 2 + 100, y);
    }
  }
  g.textAlign = 'center';
  g.globalAlpha = 0.6 + 0.4 * Math.sin(ambientT * 4);
  g.fillStyle = '#ffe066';
  g.font = 'bold 20px "Courier New", monospace';
  g.fillText('SPACE OR TAP TO PLAY AGAIN', W / 2, 560);
  g.globalAlpha = 1;
}

function render() {
  // world layer
  ctx.save();
  ctx.translate(-Math.round(camX), 0);
  ctx.drawImage(bgCanvas, 0, 0);
  clouds.forEach(c => drawCloud(ctx, c));
  punts.forEach(p => drawPunt(ctx, p));
  ducks.forEach(d => drawDuck(ctx, d));

  items.forEach(it => {
    const spr = ITEM_TYPES[it.type].spr;
    const ix = it.grounded ? it.x : it.x + Math.sin(it.sway) * 6;
    if (it.grounded && it.groundT < 0.9) ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(it.groundT * 12));
    ctx.drawImage(spr, Math.round(ix - spr.width / 2), Math.round(it.y));
    ctx.globalAlpha = 1;
  });

  // caught food shrinking into Birdie's mouth
  eatFx.forEach(f => {
    const k = Math.max(f.t / f.dur, 0);
    const mx = dog.x + dog.facing * 40, my = GROUND_Y - 42 + dog.hopY;
    const x = mx + (f.x - mx) * k, y = my + (f.y - my) * k;
    const sc = 0.3 + 0.7 * k;
    ctx.drawImage(f.spr, x - f.spr.width * sc / 2, y - f.spr.height * sc / 2, f.spr.width * sc, f.spr.height * sc);
  });

  pigeons.forEach(pg => drawPigeon(ctx, pg));
  drawDog(ctx);

  particles.forEach(p => {
    ctx.globalAlpha = Math.max(p.t, 0);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), 5, 5);
  });
  ctx.globalAlpha = 1;
  popups.forEach(p => {
    ctx.globalAlpha = Math.max(p.t, 0);
    ctx.fillStyle = p.color;
    ctx.font = 'bold ' + p.size + 'px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  });
  ctx.globalAlpha = 1;
  ctx.restore();

  // screen layer
  if (state === 'playing' || state === 'dying') {
    drawHUD(ctx);
    drawArrows(ctx);
    // JUMP button (mainly for touch; Space/W/Up on keyboard)
    ctx.fillStyle = 'rgba(15,23,32,0.6)';
    ctx.fillRect(JUMP_BTN.x, JUMP_BTN.y, JUMP_BTN.w, JUMP_BTN.h);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 2;
    ctx.strokeRect(JUMP_BTN.x, JUMP_BTN.y, JUMP_BTN.w, JUMP_BTN.h);
    ctx.fillStyle = dog.hopY < 0 ? '#ffe066' : '#e8ecef';
    ctx.font = 'bold 17px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('JUMP ⇧', JUMP_BTN.x + JUMP_BTN.w / 2, JUMP_BTN.y + 32);
  }
  if (announceT > 0) {
    ctx.globalAlpha = Math.min(1, announceT);
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 24px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(announceMsg, W / 2, 120);
    ctx.globalAlpha = 1;
  }
  if (state === 'dying') {
    ctx.fillStyle = 'rgba(224,49,49,' + (0.25 + 0.2 * Math.sin(ambientT * 20)) + ')';
    ctx.fillRect(0, 0, W, H);
  }
  if (state === 'title') drawTitle(ctx);
  if (state === 'entername') drawEnterName(ctx);
  if (state === 'gameover') drawGameOver(ctx);
}

// ---------- main loop ----------
let last = 0;
function frame(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
